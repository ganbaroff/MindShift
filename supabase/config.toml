# Supabase local development config
# Docs: https://supabase.com/docs/guides/cli/config
# Run: supabase start (requires Docker)
# Reset: supabase db reset  ← applies all migrations in supabase/migrations/

project_id = "awfoqycoltvhamtrsvxk"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "https://mindshift-umber.vercel.app/**",
  "https://mind-shift-git-main-yusifg27-3093s-projects.vercel.app/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Google OAuth is configured via Supabase Dashboard (not config.toml)
# New CLI requires client_id when enabled=true, which we don't commit
# [auth.external.google]
# enabled = true

# ── Extensions ────────────────────────────────────────────────────────────────
# pg_cron: enabled in production Supabase dashboard (not in config.toml — new CLI format)
# See: https://supabase.com/dashboard/project/awfoqycoltvhamtrsvxk/database/extensions

# ── Edge function config ───────────────────────────────────────────────────────
# verify_jwt = false for webhook functions that receive external calls without a user token

[functions.mochi-respond]
verify_jwt = true

[functions.decompose-task]
verify_jwt = true

[functions.recovery-message]
verify_jwt = true

[functions.weekly-insight]
verify_jwt = true

[functions.classify-voice-input]
verify_jwt = true

[functions.gdpr-export]
verify_jwt = true

[functions.gdpr-delete]
verify_jwt = true

[functions.telegram-webhook]
verify_jwt = false

[functions.gcal-sync]
verify_jwt = true

[functions.gcal-store-token]
verify_jwt = true

[functions.scheduled-push]
verify_jwt = true

[functions.create-checkout]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.volaura-bridge-proxy]
verify_jwt = false

[functions.dodo-webhook]
verify_jwt = false

[functions.gcal-inbound]
verify_jwt = true

[functions.telegram-agent-update]
verify_jwt = false
