apply plugin: 'com.android.application'

// ─────────────────────────────────────────────────────────────────────────────
// Release signing — pulled from environment. Required for `bundleRelease`
// (Play Store AAB) and `assembleRelease` (sideload APK).
// ENV vars (set in shell before invoking gradle):
//   MINDSHIFT_KEYSTORE_PATH      — path to release.keystore.
//                                  Default: ../release.keystore (resolved
//                                  from android/app/ → android/release.keystore).
//   MINDSHIFT_KEYSTORE_PASSWORD  — store password (required).
//   MINDSHIFT_KEY_ALIAS          — key alias inside the keystore (required).
//   MINDSHIFT_KEY_PASSWORD       — key password (required).
// If any of the three required ENV vars is missing, the release config is
// left empty and the release build fails loudly with "Keystore file ... not
// found" / "no signingConfig". We do NOT silently fall back to the debug
// signing key — debug signature on a release AAB would break Play Store
// upgrade-data-preservation and lock the app out of the install slot.
// ─────────────────────────────────────────────────────────────────────────────
def releaseStoreFilePath = System.getenv("MINDSHIFT_KEYSTORE_PATH") ?: "../release.keystore"
def releaseStorePassword = System.getenv("MINDSHIFT_KEYSTORE_PASSWORD")
def releaseKeyAlias      = System.getenv("MINDSHIFT_KEY_ALIAS")
def releaseKeyPassword   = System.getenv("MINDSHIFT_KEY_PASSWORD")

android {
    namespace = "com.v0laura.mindshift"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.v0laura.mindshift"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 200
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Configure only when all required env vars are present.
            // If any are missing, the config stays empty and the release
            // build will fail with a clear "no signingConfig" error.
            if (releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
