name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Supabase public keys — safe to embed (anon key is client-facing by design)
      VITE_SUPABASE_URL: https://cinctbslvejqicxanvnr.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpbmN0YnNsdmVqcWljeGFudm5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjkzNTYsImV4cCI6MjA4ODYwNTM1Nn0.QWSu9zWLk4VgUYp-I2QBd1MbAXforqY1vMtgcAiv2FQ
      # Sentry DSN for CI — set VITE_SENTRY_DSN in repo Secrets to enable
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests (Playwright)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Bundle size summary
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lhS dist/assets/*.js 2>/dev/null | head -5 >> $GITHUB_STEP_SUMMARY || true
