name: Deploy Edge Functions

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only deploy edge functions after CI passes — prevents broken functions from
# deploying before TypeScript/build failures are caught.
# Note: workflow_run only fires for the default branch (main) — PRs are unaffected.

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy mochi-respond --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy decompose-task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy recovery-message --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy weekly-insight --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy classify-voice-input --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gdpr-export --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gdpr-delete --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy telegram-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gcal-sync --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gcal-store-token --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy scheduled-push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy create-checkout --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy stripe-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gcal-inbound --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
