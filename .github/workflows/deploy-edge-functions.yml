name: Deploy Edge Functions

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only deploy edge functions after CI passes — prevents broken functions from
# deploying before TypeScript/build failures are caught.
# Note: workflow_run only fires for the default branch (main) — PRs are unaffected.

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          FAILED=""
          deploy() {
            local name="$1"; shift
            supabase functions deploy "$name" "$@" --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
              || FAILED="$FAILED $name"
          }
          deploy mochi-respond
          deploy decompose-task
          deploy recovery-message
          deploy weekly-insight
          deploy classify-voice-input
          deploy gdpr-export
          deploy gdpr-delete
          deploy telegram-webhook --no-verify-jwt
          deploy gcal-sync
          deploy gcal-store-token
          deploy scheduled-push
          deploy create-checkout
          deploy stripe-webhook --no-verify-jwt
          deploy gcal-inbound
          if [ -n "$FAILED" ]; then
            echo "::error::Failed to deploy:$FAILED"
            exit 1
          fi
