name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy mochi-respond --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy decompose-task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy recovery-message --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy weekly-insight --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy classify-voice-input --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gdpr-export --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gdpr-delete --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy telegram-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gcal-sync --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy gcal-store-token --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
