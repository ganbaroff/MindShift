<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />
  <title>MindShift — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0F1117;
      color: #E8E8F0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #8B8BA7; max-width: 320px; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 14px 32px;
      border-radius: 16px;
      border: 1.5px solid #6C63FF;
      background: rgba(108, 99, 255, 0.15);
      color: #6C63FF;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: rgba(108, 99, 255, 0.25); }
    .hint { font-size: 12px; color: #3D405B; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="emoji">🌿</div>
  <h1>You're offline</h1>
  <p>No worries — your data is saved locally. Reconnect to sync and access all features.</p>
  <button onclick="location.reload()">Try again</button>
  <p class="hint">MindShift works best with an internet connection for AI features.</p>
</body>
</html>
