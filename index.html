    <!-- Early theme detection: prevents dark→light flash (FOUC) on load.
         Reads persisted theme from IDB/localStorage BEFORE React hydrates.
         Sets data-theme + theme-color meta immediately. -->
    <script>
    (function(){
      try {
        // idbStorage writes a localStorage backup at 'mindshift-store_backup' on every save.
        // After IDB migration the primary 'mindshift-store' key is deleted from localStorage,
        // so we read the backup first (post-migration path), then fall back to the primary key
        // (pre-migration / first load path).
        var raw = localStorage.getItem('mindshift-store_backup')
               || localStorage.getItem('mindshift-store');
        var theme = 'dark'; // default
        if (raw) {
          var parsed = JSON.parse(raw);
          // Store field is 'userTheme', not 'theme'
          var userTheme = (parsed && parsed.state && parsed.state.userTheme) || 'dark';
          if (userTheme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          } else if (userTheme === 'light' || userTheme === 'dark') {
            theme = userTheme;
          }
        }
        document.documentElement.setAttribute('data-theme', theme);
        // Update theme-color meta for browser chrome
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#F5F3EE' : '#0F1117');
      } catch(e) { /* fallback: dark theme, React will fix on hydrate */ }
    })();
    </script>

    <!-- JSON-LD structured data (SoftwareApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    }
    </script>

    <!--

    <script defer data-domain="mindshift.app" src="https://plausible.io/js/script.js"></script>
