<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="description" content="ADHD-aware AI productivity co-pilot. Guilt-free focus, one task at a time." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MindShift" />
    <meta name="application-name" content="MindShift" />
    <meta name="msapplication-TileColor" content="#6C63FF" />

    <!-- Canonical URL — prevents duplicate SPA route indexing -->
    <link rel="canonical" href="https://mindshift.app" />

    <!-- Open Graph -->
    <meta property="og:title" content="MindShift — Focus made kind" />
    <meta property="og:description" content="ADHD-aware AI productivity co-pilot. Guilt-free focus, one task at a time." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mindshift.app" />
    <meta property="og:image" content="https://mindshift.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MindShift — ADHD-aware AI productivity app" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="MindShift" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mindshiftapp" />
    <meta name="twitter:creator" content="@mindshiftapp" />
    <meta name="twitter:title" content="MindShift — Focus made kind" />
    <meta name="twitter:description" content="ADHD-aware AI productivity co-pilot. Guilt-free focus, one task at a time." />
    <meta name="twitter:image" content="https://mindshift.app/og-image.png" />
    <meta name="twitter:image:alt" content="MindShift app screenshot" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Performance: DNS + TLS warmup for critical third parties -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cinctbslvejqicxanvnr.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://plausible.io" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>MindShift — Focus made kind</title>

    <!-- JSON-LD structured data (SoftwareApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MindShift",
      "alternateName": "MindShift — Focus made kind",
      "description": "ADHD-aware AI productivity co-pilot. Guilt-free focus, one task at a time.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "url": "https://mindshift.app",
      "image": "https://mindshift.app/og-image.png"
    }
    </script>

    <!--
      Plausible Analytics — privacy-first, no cookies, GDPR compliant.
      Replace data-domain with your actual domain (or VITE_PLAUSIBLE_DOMAIN env var via server).
      Safe to remove entirely for analytics-free setups.
    -->
    <script defer data-domain="mindshift.app" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
